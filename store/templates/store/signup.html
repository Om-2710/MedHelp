{% extends "store/base.html" %}
{% block title %}Sign Up — MedHelp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <h1 class="text-2xl font-extrabold font-display mb-2">Create your account</h1>
    <p class="text-muted-foreground text-sm mb-8">We'll email you a verification code to confirm it's really you.</p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="text-sm font-semibold block mb-1.5">Full name</label>
            <input type="text" name="name" value="{{ name|default:'' }}" required class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Email</label>
            <input type="email" name="email" value="{{ email|default:'' }}" required class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Phone <span class="text-muted-foreground font-normal">(optional)</span></label>
            <input type="text" name="phone" value="{{ phone|default:'' }}" class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Address <span class="text-muted-foreground font-normal">(optional)</span></label>
            <input type="text" name="address" value="{{ address|default:'' }}" class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Password</label>
            <input type="password" name="password" required minlength="8" class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
            <p class="text-xs text-muted-foreground mt-1">At least 8 characters.</p>
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Confirm password</label>
            <input type="password" name="confirm_password" required minlength="8" class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>

        <button type="submit" class="w-full bg-primary text-primary-foreground py-3 rounded-xl font-semibold hover:bg-[#0047b8] active:scale-95 transition-all mt-2">
            Create account &amp; send code
        </button>
    </form>

    <p class="text-sm text-muted-foreground text-center mt-6">
        Already have an account? <a href="{% url 'store:login' %}" class="text-primary font-semibold hover:underline">Log in</a>
    </p>
</div>
{% endblock %}
