{% extends "store/base.html" %}
{% block title %}Log In — ShopStack{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <h1 class="text-2xl font-extrabold font-display mb-8">Log in</h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div>
            <label class="text-sm font-semibold block mb-1.5">Email</label>
            <input type="email" name="email" value="{{ email|default:'' }}" required autofocus class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>
        <div>
            <label class="text-sm font-semibold block mb-1.5">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-2.5 border border-border rounded-xl focus:outline-none focus:border-primary">
        </div>

        <button type="submit" class="w-full bg-primary text-primary-foreground py-3 rounded-xl font-semibold hover:bg-[#0047b8] active:scale-95 transition-all mt-2">
            Log In
        </button>
    </form>

    <p class="text-sm text-muted-foreground text-center mt-6">
        Don't have an account? <a href="{% url 'store:signup' %}" class="text-primary font-semibold hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}
